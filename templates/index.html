<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importador de Novedades MineDax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-connected {
            background-color: #4caf50;
        }

        .status-disconnected {
            background-color: #f44336;
        }

        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .alert.show {
            display: block;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: block;
            padding: 10px;
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .file-input-label:hover {
            background: #e8e8ff;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            padding: 8px;
            background: white;
            margin-bottom: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-remove {
            color: #f44336;
            cursor: pointer;
            font-weight: bold;
        }

        .preview-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .preview-item {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .preview-item strong {
            color: #667eea;
        }

        .results-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .results-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .result-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid;
        }

        .result-success {
            background: #d4edda;
            border-left-color: #4caf50;
            color: #155724;
        }

        .result-error {
            background: #f8d7da;
            border-left-color: #f44336;
            color: #721c24;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-results {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table-results th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .table-results td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .table-results tr:hover {
            background: #f5f5f5;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #4caf50;
            color: white;
        }

        .badge-error {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Importador de Novedades MineDax</h1>
            <p>Sistema de importación automática de Permisos y Vacaciones desde PDF</p>
        </header>

        <div class="main-grid">
            <!-- Tarjeta de Configuración -->
            <div class="card">
                <h2>⚙️ Configuración de BD</h2>
                <div class="alert alert-error" id="configAlert"></div>

                <div class="form-group">
                    <label for="server">Servidor SQL:</label>
                    <input type="text" id="server" placeholder="localhost o IP" value="localhost">
                </div>

                <div class="form-group">
                    <label for="database">Base de Datos:</label>
                    <input type="text" id="database" placeholder="MineDax" value="MineDax">
                </div>

                <div class="form-group">
                    <label for="username">Usuario (opcional):</label>
                    <input type="text" id="username" placeholder="Dejar en blanco para autenticación Windows">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña (opcional):</label>
                    <input type="password" id="password" placeholder="Solo si se proporciona usuario">
                </div>

                <button onclick="connectDatabase()">
                    <span id="connectSpinner"></span>Conectar a BD
                </button>

                <p style="margin-top: 15px; color: #666;">
                    Estado: <span class="status-indicator status-disconnected" id="statusIndicator"></span>
                    <span id="statusText">Desconectado</span>
                </p>
            </div>

            <!-- Tarjeta de Carga de Archivos -->
            <div class="card">
                <h2>📁 Cargar Archivos PDF</h2>
                <div class="alert alert-error" id="fileAlert"></div>

                <div class="form-group">
                    <div class="file-input-wrapper">
                        <label class="file-input-label" for="fileInput" id="fileDropZone">
                            📄 Click para seleccionar o arrastra archivos PDF aquí
                        </label>
                        <input type="file" id="fileInput" multiple accept=".pdf" onchange="handleFileSelect(event)">
                    </div>
                </div>

                <div class="file-list" id="fileList"></div>

                <div class="form-group">
                    <button onclick="uploadFiles()" id="uploadBtn" disabled>
                        <span id="uploadSpinner"></span>Procesar Archivos
                    </button>
                </div>

                <div class="preview-section" id="previewSection" style="display: none;">
                    <strong>Vista Previa:</strong>
                    <div id="previewContent"></div>
                </div>
            </div>
        </div>

        <!-- Sección de Resultados -->
        <div class="results-section" id="resultsSection" style="display: none;">
            <h2>📊 Resultados de Importación</h2>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('summary')">Resumen</button>
                <button class="tab-button" onclick="switchTab('details')">Detalles</button>
                <button class="tab-button" onclick="switchTab('export')">Exportar</button>
            </div>

            <div id="summary" class="tab-content active">
                <div id="summaryContent"></div>
            </div>

            <div id="details" class="tab-content">
                <table class="table-results" id="resultsTable">
                    <thead>
                        <tr>
                            <th>Archivo</th>
                            <th>Tipo</th>
                            <th>Cédula</th>
                            <th>Nombre</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>

            <div id="export" class="tab-content">
                <button onclick="exportAsJSON()">📥 Descargar JSON</button>
                <button onclick="exportAsCSV()" style="margin-top: 10px;">📥 Descargar CSV</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let importResults = [];
        let dbConnected = false;

        // Drag and drop
        const dropZone = document.getElementById('fileDropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        dropZone.addEventListener('drop', (e) => {
            selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            updateFileList();
        });

        function handleFileSelect(event) {
            selectedFiles = Array.from(event.target.files);
            updateFileList();
        }

        function updateFileList() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <span class="file-remove" onclick="removeFile(${index})">✕</span>
                `;
                fileListDiv.appendChild(item);
            });

            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0 || !dbConnected;
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        async function connectDatabase() {
            const btn = event.target;
            const spinner = document.getElementById('connectSpinner');
            spinner.className = 'spinner';

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        server: document.getElementById('server').value,
                        database: document.getElementById('database').value,
                        username: document.getElementById('username').value || null,
                        password: document.getElementById('password').value || null
                    })
                });

                const result = await response.json();

                if (result.success) {
                    dbConnected = true;
                    document.getElementById('statusIndicator').className = 'status-indicator status-connected';
                    document.getElementById('statusText').textContent = 'Conectado ✓';
                    showAlert('configAlert', result.message, 'success');
                    document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
                } else {
                    dbConnected = false;
                    document.getElementById('statusIndicator').className = 'status-indicator status-disconnected';
                    document.getElementById('statusText').textContent = 'Desconectado';
                    showAlert('configAlert', result.message, 'error');
                }
            } catch (error) {
                showAlert('configAlert', 'Error: ' + error.message, 'error');
                dbConnected = false;
            } finally {
                spinner.className = '';
            }
        }

        async function uploadFiles() {
            if (!dbConnected) {
                showAlert('fileAlert', 'Conecta a la BD primero', 'error');
                return;
            }

            const btn = event.target;
            const spinner = document.getElementById('uploadSpinner');
            spinner.className = 'spinner';
            btn.disabled = true;

            try {
                const formData = new FormData();
                selectedFiles.forEach(file => formData.append('files', file));

                const response = await fetch('/api/batch-import', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                importResults = result.results;

                displayResults(result);
                document.getElementById('resultsSection').style.display = 'block';
            } catch (error) {
                showAlert('fileAlert', 'Error: ' + error.message, 'error');
            } finally {
                spinner.className = '';
                btn.disabled = false;
            }
        }

        function displayResults(result) {
            const summary = document.getElementById('summaryContent');
            const successful = result.results.filter(r => r.success).length;
            const failed = result.results.filter(r => !r.success).length;

            summary.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div style="text-align: center; padding: 20px; background: #f0f0f0; border-radius: 5px;">
                        <h3 style="color: #667eea;">Total Procesado</h3>
                        <p style="font-size: 2em; margin: 10px 0;">${result.total}</p>
                    </div>
                    <div style="text-align: center; padding: 20px; background: #d4edda; border-radius: 5px;">
                        <h3 style="color: #4caf50;">Exitosos</h3>
                        <p style="font-size: 2em; margin: 10px 0;">${successful}</p>
                    </div>
                    <div style="text-align: center; padding: 20px; background: #f8d7da; border-radius: 5px;">
                        <h3 style="color: #f44336;">Errores</h3>
                        <p style="font-size: 2em; margin: 10px 0;">${failed}</p>
                    </div>
                </div>
            `;

            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';

            result.results.forEach(item => {
                const row = document.createElement('tr');
                const statusBadge = item.success
                    ? '<span class="badge badge-success">✓ Importado</span>'
                    : '<span class="badge badge-error">✗ Error</span>';

                row.innerHTML = `
                    <td>${item.filename}</td>
                    <td>${item.data?.tipo_novedad || 'N/A'}</td>
                    <td>${item.data?.cedula || 'N/A'}</td>
                    <td>${item.data?.nombre || 'N/A'}</td>
                    <td>${statusBadge}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function exportAsJSON() {
            const json = JSON.stringify(importResults, null, 2);
            downloadFile(json, 'import-results.json', 'application/json');
        }

        function exportAsCSV() {
            let csv = 'Archivo,Tipo,Cédula,Nombre,Estado\n';
            importResults.forEach(r => {
                csv += `"${r.filename}","${r.data?.tipo_novedad || 'N/A'}","${r.data?.cedula || 'N/A'}","${r.data?.nombre || 'N/A'}","${r.success ? 'Exitoso' : 'Error'}"\n`;
            });
            downloadFile(csv, 'import-results.csv', 'text/csv');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            setTimeout(() => alert.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
