# ============================================================================
#  CI/CD — MineDax → Azure App Service (Linux, Node 18 + Python 3.11)
#
#  Corregido: Mayo 2026
#  Cambios respecto al original:
#    - Node.js 4.8 → 18.x  (4.8 es obsoleto e incompatible)
#    - Runner: windows-latest → ubuntu-latest  (más rápido, compatible Linux App Service)
#    - Añadido: Python 3.11 + pip install requirements.txt
#    - Zip correcto: excluye .git, temp, .env, node_modules (Azure los reinstala)
#    - Un solo job: build + deploy combinados para evitar problemas de artefactos
# ============================================================================

name: Deploy MineDax → Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Código fuente ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js 18 ───────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      # ── 3. Python 3.11 (para rellenar_pdf.py y procesar_pdf.py) ─────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Instalar dependencias Node (solo producción) ──────────────────
      - name: Install Node.js dependencies
        run: npm ci --omit=dev

      # ── 5. Verificar sintaxis del servidor (falla rápido si hay error) ───
      - name: Validate server.js syntax
        run: node --check server.js

      # ── 6. Crear paquete de despliegue ───────────────────────────────────
      #    Se excluyen: .git, .env (secretos van en App Settings de Azure),
      #    node_modules (Azure los reinstala en el servidor), temp, logs
      - name: Create deployment zip
        run: |
          zip -r app.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".vscode/*" \
            --exclude ".claude/*" \
            --exclude "node_modules/*" \
            --exclude "temp/*" \
            --exclude "logs/*" \
            --exclude "*.log" \
            --exclude ".env" \
            --exclude "app.zip"
          echo "Tamaño del paquete: $(du -sh app.zip | cut -f1)"

      # ── 7. Login a Azure (OIDC — sin contraseñas en el workflow) ─────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0D167792D4A3485C828BF4035F5C060D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_ADCEA25E95274618962511B35F19159A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A9EC49599D934F79903AFF6713B46902 }}

      # ── 8. Desplegar a Azure App Service ─────────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'NominaCollectiveMining'
          slot-name: 'Production'
          package: app.zip
