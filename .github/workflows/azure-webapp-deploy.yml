name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --no-audit --prefer-offline

      - name: Prune devDependencies (optional)
        run: |
          npm prune --production || true

      - name: Archive app
        run: |
          powershell -Command "
            \$exclude = @('.git','.github','.vscode','.claude','.env','app.zip','temp','logs','iisnode')
            \$files = Get-ChildItem -Path '.' -Force | Where-Object { \$_.Name -notin \$exclude }
            Compress-Archive -Path \$files.FullName -DestinationPath app.zip -Force
            Write-Host ('Tamaño del paquete: ' + [math]::Round((Get-Item app.zip).Length/1MB,1) + ' MB')
          "

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
