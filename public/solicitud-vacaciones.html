<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de Vacaciones — Collective Mining</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cm-blue:    #20A7C9;
      --cm-blue-lt: rgba(32,167,201,0.18);
      --coal:       #2B2B2B;
      --dark:       #222222;
      --surface:    #2E2E2E;
      --surface2:   #383838;
      --border:     rgba(32,167,201,0.18);
      --text:       #FFFFFF;
      --muted:      #9A9A9A;
      --danger:     #E05555;
      --success:    #4CAF82;
      --radius:     10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', Arial, sans-serif;
      background: var(--coal);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 56px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: var(--cm-blue);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      margin-bottom: 14px;
    }
    .logo-mark svg { width: 26px; height: 26px; }
    .page-header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }
    .page-header .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .doc-badge {
      display: inline-block;
      background: var(--cm-blue-lt);
      color: var(--cm-blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
      border: 1px solid var(--border);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 18px;
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--cm-blue);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Autocomplete search ── */
    .search-wrap { position: relative; }
    .search-wrap input { padding-right: 42px; }
    .search-icon {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .ac-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }
    .ac-dropdown.open { display: block; }
    .ac-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: rgba(32,167,201,0.12); }
    .ac-item .ac-name { font-size: 14px; font-weight: 600; }
    .ac-item .ac-cedula { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ac-empty {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Employee card ── */
    .emp-card {
      display: none;
      background: rgba(32,167,201,0.07);
      border: 1px solid rgba(32,167,201,0.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-top: 12px;
      gap: 12px;
      align-items: center;
    }
    .emp-card.show { display: flex; }
    .emp-avatar {
      width: 40px; height: 40px; min-width: 40px;
      background: var(--cm-blue);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .emp-info .emp-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .emp-info .emp-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Fields ── */
    .field-row {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }
    .field-row:last-child { margin-bottom: 0; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    label .req { color: var(--cm-blue); margin-left: 2px; }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Barlow', inherit;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--cm-blue);
      box-shadow: 0 0 0 3px rgba(32,167,201,0.12);
    }
    input:disabled { opacity: 0.45; cursor: not-allowed; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) saturate(3) hue-rotate(165deg);
      cursor: pointer;
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    /* ── Días badge ── */
    .dias-badge {
      display: none;
      background: rgba(32,167,201,0.1);
      border: 1px solid rgba(32,167,201,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--cm-blue);
      text-align: center;
      margin-top: 8px;
    }
    .dias-badge.show { display: block; }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: 8px;
      padding: 11px 22px;
      font-size: 14px; font-weight: 600;
      font-family: 'Barlow', inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--cm-blue);
      color: #fff; width: 100%;
      font-size: 15px; padding: 13px 24px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── Alerts ── */
    .alert {
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error   { background: rgba(224,85,85,0.12);  border: 1px solid rgba(224,85,85,0.3);  color: #ff8787; }
    .alert-success { background: rgba(76,175,130,0.12); border: 1px solid rgba(76,175,130,0.3); color: #72dba8; }
    .alert-info    { background: rgba(32,167,201,0.1);  border: 1px solid rgba(32,167,201,0.25); color: var(--cm-blue); }

    .section-form { display: none; }
    .section-form.show { display: block; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 11px; color: #5a5a5a; margin-top: 2px; }

    @media (max-width: 520px) {
      .field-row.cols-2, .field-row.cols-3 { grid-template-columns: 1fr; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="page-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        <path d="M12 2V22M3 7L21 17M21 7L3 17" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
      </svg>
    </div>
    <h1>Collective Mining</h1>
    <div class="subtitle">Solicitud de Vacaciones — Autoservicio</div>
    <span class="doc-badge">CM-TH-SV-001</span>
  </div>

  <div id="alert-global" class="alert"></div>

  <!-- PASO 1: Identificación -->
  <div class="card">
    <div class="card-title">Identificación del Solicitante</div>

    <div class="field-row">
      <div class="field">
        <label for="q-search">Buscar por nombre o cédula <span class="req">*</span></label>
        <div class="search-wrap">
          <input
            type="text"
            id="q-search"
            autocomplete="off"
            placeholder="Escriba nombre o número de cédula..."
            oninput="acOnInput()"
            onkeydown="acOnKey(event)"
          >
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </span>
          <div class="ac-dropdown" id="ac-drop"></div>
        </div>
      </div>
    </div>

    <div class="emp-card" id="emp-card">
      <div class="emp-avatar" id="emp-avatar">?</div>
      <div class="emp-info">
        <div class="emp-name" id="emp-nombre"></div>
        <div class="emp-meta" id="emp-meta"></div>
      </div>
    </div>
  </div>

  <!-- PASO 2: Formulario -->
  <div class="section-form" id="section-form">

    <!-- Correo -->
    <div class="card">
      <div class="card-title">Correo de Contacto</div>
      <div class="field-row">
        <div class="field">
          <label for="email_solicitante">Correo electrónico <span class="req">*</span></label>
          <input type="email" id="email_solicitante" placeholder="tucorreo@ejemplo.com">
        </div>
      </div>
    </div>

    <!-- Período de vacaciones -->
    <div class="card">
      <div class="card-title">Período de Vacaciones</div>

      <div class="field-row cols-2">
        <div class="field">
          <label for="fecha_inicio">Fecha de Inicio <span class="req">*</span></label>
          <input type="date" id="fecha_inicio" onchange="calcularDias()">
        </div>
        <div class="field">
          <label for="fecha_fin">Fecha de Fin <span class="req">*</span></label>
          <input type="date" id="fecha_fin" onchange="calcularDias()">
        </div>
      </div>

      <div id="dias-badge" class="dias-badge"></div>

      <div class="field-row" style="margin-top:16px">
        <div class="field">
          <label for="dias_vacaciones">Total de Días de Vacaciones</label>
          <input type="number" id="dias_vacaciones" min="1" step="1" placeholder="Se calcula automáticamente">
          <span class="hint">Se calcula automáticamente según las fechas seleccionadas. Puede ajustarlo si excluye fines de semana o festivos.</span>
        </div>
      </div>
    </div>

    <!-- Gestión durante ausencia -->
    <div class="card">
      <div class="card-title">Gestión Durante la Ausencia</div>

      <div class="field-row">
        <div class="field">
          <label for="actividades">Actividades a Dejar Programadas</label>
          <textarea id="actividades" placeholder="Describa las actividades o pendientes que quedan programados durante su ausencia..."></textarea>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="reemplazo">Persona que Cubre / Reemplazo</label>
          <input type="text" id="reemplazo" placeholder="Nombre del colaborador que asumirá sus responsabilidades">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" placeholder="Información adicional para Talento Humano..."></textarea>
        </div>
      </div>
    </div>

    <div id="alert-submit" class="alert"></div>

    <button type="button" class="btn btn-primary" id="btn-submit" onclick="enviarSolicitud()">
      Enviar Solicitud de Vacaciones
    </button>

  </div><!-- /section-form -->

</div><!-- /container -->

<script>
  // ─── Estado ───────────────────────────────────────────────────────────────────
  let _empData  = null;
  let _acTimer  = null;
  let _acIdx    = -1;
  let _acItems  = [];

  // ─── Alertas ─────────────────────────────────────────────────────────────────
  function showAlert(id, tipo, msg) {
    const el = document.getElementById(id);
    el.className = `alert alert-${tipo} show`;
    el.textContent = msg;
  }
  function hideAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
  }

  // ─── Autocomplete ─────────────────────────────────────────────────────────────
  const dropEl  = document.getElementById('ac-drop');
  const inputEl = document.getElementById('q-search');

  function acOnInput() {
    clearTimeout(_acTimer);
    _acTimer = setTimeout(acFetch, 280);
  }

  async function acFetch() {
    const q = inputEl.value.trim();
    if (q.length < 2) { acClose(); return; }
    try {
      const resp = await fetch(`/api/maestros/buscar-cedulas?q=${encodeURIComponent(q)}`);
      if (!resp.ok) { acClose(); return; }
      const data = await resp.json();
      _acItems = Array.isArray(data) ? data : (data.empleados || []);
      acRender();
    } catch (_) { acClose(); }
  }

  function acRender() {
    _acIdx = -1;
    if (!_acItems.length) {
      dropEl.innerHTML = '<div class="ac-empty">Sin resultados</div>';
      dropEl.classList.add('open');
      return;
    }
    dropEl.innerHTML = _acItems.map((e, i) => `
      <div class="ac-item" data-idx="${i}"
           onmousedown="acSeleccionar(${i})"
           onmouseover="acHover(${i})">
        <div class="ac-name">${e.nombre || e.NOM_COMP || ''}</div>
        <div class="ac-cedula">C.C. ${e.cedula || e.NUM_IDEN || e.codigo || ''}</div>
      </div>`).join('');
    dropEl.classList.add('open');
  }

  function acHover(i) { _acIdx = i; acHighlight(); }

  function acHighlight() {
    dropEl.querySelectorAll('.ac-item').forEach((el, i) => {
      el.classList.toggle('active', i === _acIdx);
    });
  }

  function acClose() {
    dropEl.classList.remove('open');
    dropEl.innerHTML = '';
    _acItems = [];
    _acIdx   = -1;
  }

  function acOnKey(e) {
    if (!dropEl.classList.contains('open')) return;
    if (e.key === 'ArrowDown') {
      _acIdx = Math.min(_acIdx + 1, _acItems.length - 1);
      acHighlight(); e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      _acIdx = Math.max(_acIdx - 1, 0);
      acHighlight(); e.preventDefault();
    } else if (e.key === 'Enter' && _acIdx >= 0) {
      acSeleccionar(_acIdx); e.preventDefault();
    } else if (e.key === 'Escape') {
      acClose();
    }
  }

  async function acSeleccionar(i) {
    const emp = _acItems[i];
    if (!emp) return;
    const cedula = String(emp.cedula || emp.NUM_IDEN || emp.codigo || '').trim();
    inputEl.value = emp.nombre || emp.NOM_COMP || '';
    acClose();
    hideAlert('alert-global');
    await verificarPorCedula(cedula);
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) acClose();
  });

  // ─── Verificar empleado ───────────────────────────────────────────────────────
  async function verificarPorCedula(cedula) {
    if (!cedula || cedula.length < 5) return;
    try {
      const resp = await fetch(`/api/solicitudes/verificar-empleado?cedula=${encodeURIComponent(cedula)}`);
      const data = await resp.json();

      if (!resp.ok || !data.success) {
        showAlert('alert-global', 'error', data.error || 'Empleado no encontrado. Verifique su cédula.');
        ocultarEmpleado();
        return;
      }

      _empData = { ...data, cedula };
      mostrarEmpleado(data.nombre, data.cargo, data.area);
      showAlert('alert-global', 'info', 'Empleado verificado. Complete el formulario y envíe su solicitud.');

    } catch (err) {
      showAlert('alert-global', 'error', 'Error de conexión. Intente nuevamente.');
    }
  }

  function mostrarEmpleado(nombre, cargo, area) {
    const initials = nombre.trim().split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    document.getElementById('emp-avatar').textContent = initials || '?';
    document.getElementById('emp-nombre').textContent = nombre;
    document.getElementById('emp-meta').textContent   = [cargo, area].filter(Boolean).join(' · ');
    document.getElementById('emp-card').classList.add('show');
    document.getElementById('section-form').classList.add('show');
  }

  function ocultarEmpleado() {
    _empData = null;
    document.getElementById('emp-card').classList.remove('show');
    document.getElementById('section-form').classList.remove('show');
  }

  // ─── Calcular días ────────────────────────────────────────────────────────────
  function calcularDias() {
    const inicio = document.getElementById('fecha_inicio').value;
    const fin    = document.getElementById('fecha_fin').value;
    const badge  = document.getElementById('dias-badge');

    if (inicio && fin) {
      const d1 = new Date(inicio), d2 = new Date(fin);
      if (d2 < d1) { badge.className = 'dias-badge'; return; }
      const dias = Math.round((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
      document.getElementById('dias_vacaciones').value = dias;
      badge.textContent  = `${dias} día${dias !== 1 ? 's' : ''} de vacaciones`;
      badge.className    = 'dias-badge show';
    } else {
      badge.className = 'dias-badge';
    }
  }

  // ─── Enviar solicitud ─────────────────────────────────────────────────────────
  async function enviarSolicitud() {
    hideAlert('alert-submit');

    if (!_empData) {
      showAlert('alert-submit', 'error', 'Primero busque y seleccione un empleado.');
      return;
    }

    const cedula          = _empData.cedula;
    const email           = document.getElementById('email_solicitante').value.trim();
    const fecha_inicio    = document.getElementById('fecha_inicio').value;
    const fecha_fin       = document.getElementById('fecha_fin').value;
    const dias_vacaciones = document.getElementById('dias_vacaciones').value;
    const actividades     = document.getElementById('actividades').value.trim();
    const reemplazo       = document.getElementById('reemplazo').value.trim();
    const observaciones   = document.getElementById('observaciones').value.trim();

    if (!email)                       { showAlert('alert-submit', 'error', 'Ingrese su correo electrónico.'); return; }
    if (!fecha_inicio || !fecha_fin)  { showAlert('alert-submit', 'error', 'Seleccione las fechas de vacaciones.'); return; }
    if (new Date(fecha_inicio) > new Date(fecha_fin)) {
      showAlert('alert-submit', 'error', 'La fecha de inicio no puede ser posterior a la fecha final.');
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando solicitud...';

    // Contador de segundos visible si la BD tarda en reanudar (puede ocurrir tras
    // un período de inactividad en Azure SQL Serverless — hasta ~90 segundos)
    let _seg = 0;
    const _tickerInterval = setInterval(() => {
      _seg++;
      if (_seg >= 5) {
        btn.innerHTML = `<span class="spinner"></span>Conectando con la base de datos… (${_seg}s)`;
      }
    }, 1000);

    // Timeout de 120 segundos para tolerar el resume de Azure SQL Serverless
    const _ctrl    = new AbortController();
    const _timeout = setTimeout(() => _ctrl.abort(), 120000);

    try {
      const resp = await fetch('/api/solicitudes/vacaciones', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: _ctrl.signal,
        body: JSON.stringify({
          cedula, email_solicitante: email,
          fecha_inicio, fecha_fin, dias_vacaciones,
          actividades, reemplazo, observaciones,
        }),
      });

      clearTimeout(_timeout); clearInterval(_tickerInterval);
      const data = await resp.json();

      if (resp.ok && data.success) {
        showAlert('alert-submit', 'success', `Solicitud enviada exitosamente. ${data.mensaje}`);
        btn.textContent = '✓ Solicitud Enviada';
        document.getElementById('section-form').querySelectorAll('input,select,textarea,button').forEach(el => el.disabled = true);
      } else {
        showAlert('alert-submit', 'error', data.error || 'Error al procesar la solicitud.');
        btn.disabled = false;
        btn.textContent = 'Enviar Solicitud de Vacaciones';
      }
    } catch (err) {
      clearTimeout(_timeout); clearInterval(_tickerInterval);
      const msg = err.name === 'AbortError'
        ? 'La solicitud tardó demasiado. El servidor puede estar iniciando — intente nuevamente en unos segundos.'
        : 'Error de conexión. Intente nuevamente.';
      showAlert('alert-submit', 'error', msg);
      btn.disabled = false;
      btn.textContent = 'Enviar Solicitud de Vacaciones';
    }
  }
</script>
</body>
</html>
